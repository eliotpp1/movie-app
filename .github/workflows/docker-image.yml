name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: movies_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Build backend Docker image
        run: docker build -t movie-app-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t movie-app-frontend ./frontend

      - name: Run backend container
        run: |
          docker run -d --name backend-test --env MYSQL_HOST=host.docker.internal \
            --env MYSQL_USER=root --env MYSQL_PASSWORD=root --env MYSQL_DB=movies_db \
            -p 3001:3001 movie-app-backend

      - name: Wait for backend to start
        run: |
          echo "Waiting for backend..."
          sleep 15

      - name: Run frontend container
        run: docker run -d --name frontend-test -p 3000:3000 movie-app-frontend

      - name: Wait for frontend to start
        run: |
          echo "Waiting for frontend..."
          sleep 15
          
      - name: Test frontend
        run: curl --fail http://localhost:3000 || exit 1
        
      - name: Test backend
        run: curl --fail http://backend:3001/films || exit 1

      - name: Stop and remove containers
        run: |
          docker stop frontend-test backend-test
          docker rm frontend-test backend-test
